name: little_lights
description: "Bible story mini-games for young children."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.21.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  equatable: ^2.0.7
  shared_preferences: ^2.3.4
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/images/ui/
    - assets/images/stories/noah/background/
    - assets/images/stories/noah/animals/
    - assets/images/stories/noah/ui/
    - assets/images/stories/noah/cutscene/
    - assets/images/stories/david/background/
    - assets/images/stories/david/characters/
    - assets/images/stories/david/ui/
    - assets/images/stories/david/cutscene/
    - assets/images/stories/jonah/background/
    - assets/images/stories/jonah/characters/
    - assets/images/stories/jonah/ui/
    - assets/images/stories/jonah/cutscene/
    - assets/images/stories/adam/background/
    - assets/images/stories/adam/characters/
    - assets/images/stories/adam/animals/
    - assets/images/stories/adam/ui/
    - assets/images/stories/adam/cutscene/
    - assets/images/stories/moses/background/
    - assets/images/stories/moses/characters/
    - assets/images/stories/moses/ui/
    - assets/images/stories/moses/cutscene/
    - assets/images/stories/daniel/background/
    - assets/images/stories/daniel/characters/
    - assets/images/stories/daniel/ui/
    - assets/images/stories/daniel/cutscene/
    - assets/images/stories/samaritan/background/
    - assets/images/stories/samaritan/characters/
    - assets/images/stories/samaritan/ui/
    - assets/images/stories/samaritan/cutscene/
    - assets/images/stories/zacchaeus/background/
    - assets/images/stories/zacchaeus/characters/
    - assets/images/stories/zacchaeus/ui/
    - assets/images/stories/zacchaeus/cutscene/
    - assets/images/stories/feeding/background/
    - assets/images/stories/feeding/characters/
    - assets/images/stories/feeding/ui/
    - assets/images/stories/feeding/cutscene/
    - assets/images/stories/creation/background/
    - assets/images/stories/creation/ui/
    - assets/images/stories/creation/cutscene/
    - assets/audio/music/
    - assets/audio/sfx/

  fonts:
    - family: RoundedFont
      fonts:
        - asset: assets/fonts/rounded_font.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/ui/app_icon_1024.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/ui/app_icon_1024.png"

flutter_native_splash:
  color: "#FFF8E7"
  image: "assets/images/ui/app_icon_1024.png"
  image_dark: "assets/images/ui/app_icon_1024.png"
  color_dark: "#1A1A2E"
  android: true
  ios: true
  web: false
