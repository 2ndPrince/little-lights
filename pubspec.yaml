name: little_lights
description: "Bible story mini-games for young children."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.21.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  equatable: ^2.0.7
  shared_preferences: ^2.3.4
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/ui/
    - assets/images/stories/noah/background/
    - assets/images/stories/noah/animals/
    - assets/images/stories/noah/ui/
    - assets/images/stories/noah/cutscene/
    - assets/images/stories/david/background/
    - assets/images/stories/david/characters/
    - assets/images/stories/david/ui/
    - assets/images/stories/david/cutscene/
    - assets/audio/music/
    - assets/audio/sfx/

  fonts:
    - family: RoundedFont
      fonts:
        - asset: assets/fonts/rounded_font.ttf
